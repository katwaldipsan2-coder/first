<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>One Piece Characters</title>
    <link rel="stylesheet" href="anime.css">

</head>

<body>

    <h1>One Piece Characters</h1>

    <div class="all">
        <img src="all.jpg" alt="">
    </div>

    <div class="container">
        <input type="radio" name="char" id="luffy">
        <input type="radio" name="char" id="zoro">
        <input type="radio" name="char" id="nami">
        <input type="radio" name="char" id="sanji">
        <input type="radio" name="char" id="usopp">

        <div class="names">
    
               <button><a href="luffy.html">luffy</a></button> 
                <button><a href="sanji.html">Sanji</a></button>
               <button> <a href="zoro.html">Zoro</a></button>
                <button><a href="nami.html">Nami</a></button>
                <button><a href="usopp.html">Usopp</a></button>
            

        </div>

        <div class="details">
            <div class="card luffy">
                <h2>Monkey D. Luffy</h2>
                <img src="luffy.jpg">
                <p>Captain of the Straw Hat Pirates. Wants to become the Pirate King.</p>
            </div>

            <div class="card zoro">
                <h2>Roronoa Zoro</h2>
                <img src="zoro.jpg">
                <p>Swordsman who uses three sword style.</p>
            </div>

            <div class="card nami">
                <h2>Nami</h2>
                <img src="Nami.png">
                <p>Navigator who loves money and maps.</p>
            </div>

            <div class="card sanji">
                <h2>Sanji</h2>
                <img src="sanji.png">
                <p>Cook of the crew, fights using kicks.</p>
            </div>

            <div class="card usopp">
                <h2>Usopp</h2>
                <img src="usopp.jpg">
                <p>Sniper of the crew, brave but funny.</p>
            </div>

        </div>
    </div>

</body>

</html>
